name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate snake animation
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: 4r7hur9
          outputs: |
            dist/github-snake.svg?color_snake=#a855f7&color_dots=#ebedf0,#9be9a8,#40c463,#30a14e,#216e39
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#a855f7&color_dots=#161b22,#0e4429,#006d32,#26a641,#39d353

      - name: Push files to output branch
        run: |
          mkdir -p /tmp/snake-output
          cp -r dist/* /tmp/snake-output/

          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git switch --orphan output
          git rm -rf . || true
          cp -r /tmp/snake-output/* .

          git add .
          git commit -m "Generate snake animation" || exit 0
          git push -f origin output
